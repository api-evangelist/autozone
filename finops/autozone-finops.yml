specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: AutoZone
providerId: autozone
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: AutoZone has no public API and no published developer pricing. This artifact captures the
  absence of a public FinOps surface.
tags:
  - FinOps
  - FOCUS
  - Automotive Parts
  - Retail
description: AutoZone does not publish a public API or developer pricing. There is no FinOps surface
  to align with; commercial integrations are billed at the parts-purchase level via the customer's
  AutoZone Commercial account.
sources:
  - https://www.autozone.com/
  - https://www.autozonepro.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: AutoZone, Inc.
serviceCategory: Automotive Parts Retail
billingModel:
  pricingCategory: Bilateral Contract
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: AutoZone
  ServiceCategory: Automotive Parts Retail
  ProviderName: AutoZone
  PublisherName: AutoZone, Inc.
  InvoiceIssuerName: AutoZone, Inc.
  BillingCurrency: USD
meters:
  - name: parts_orders
    unit: order
    aggregation: count
    dimensions:
      - account
      - location
  - name: parts_lines
    unit: line
    aggregation: sum
principles:
  - name: Visibility
    description: There is no public AutoZone API for usage telemetry. Reporting is via AutoZonePro
      account statements.
  - name: Allocation
    description: Allocate by AutoZone Commercial account number / shop location.
  - name: Optimization
    description: Optimize via commercial-account terms negotiated with AutoZone Commercial sales.
  - name: Accountability
    description: Owned by the procurement / shop-operations team that holds the AutoZone Commercial
      account.
maintainers:
