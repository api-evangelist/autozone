aid: autozone
name: AutoZone
description: >-
  AutoZone is the nation's leading retailer and a leading distributor of automotive
  replacement parts and accessories with more than 7,000 stores across the Americas.
  AutoZone serves both do-it-yourself (DIY) customers and professional automotive
  service providers (DIFM) through retail stores, e-commerce, and electronic ordering
  integrations for commercial accounts via AutoZone Pro.
