apis:
  - aid: autozone:autozonepro-electronic-ordering
    name: AutoZone Pro Electronic Ordering
    description: >-
      AutoZone Pro provides electronic ordering capabilities for professional
      automotive service providers and repair shops. The platform supports EDI-based
      parts ordering integrations enabling shop management systems (SMS) and point-of-
      sale systems to send parts orders, check availability, and receive confirmations
      directly from AutoZone's catalog and inventory systems.
    humanURL: https://www.autozonepro.com/info/about/Electronic-Ordering.jsp
    baseURL: https://www.autozonepro.com
    tags:
      - Auto Parts
      - Automotive
      - EDI
      - Electronic Ordering
      - Commercial Accounts
      - Professional Installers
    properties:
      - type: Website
        url: https://www.autozonepro.com/info/about/Electronic-Ordering.jsp
      - type: Portal
        url: https://www.autozonepro.com

  - aid: autozone:autozone-ecommerce
    name: AutoZone E-Commerce Platform
    description: >-
      AutoZone's e-commerce platform at autozone.com enables consumers and
      commercial customers to search the AutoZone parts catalog, check store
      inventory, place online orders for in-store pickup or delivery, and
      manage their AutoZone loyalty and commercial accounts.
    humanURL: https://www.autozone.com
    tags:
      - Auto Parts
      - E-Commerce
      - Parts Search
      - Online Ordering
    properties:
      - type: Website
        url: https://www.autozone.com

common:
  - type: Website
    url: https://www.autozone.com
  - type: Portal
    url: https://www.autozonepro.com
  - type: GitHubOrganization
    url: https://github.com/autozone
  - type: Features
    data:
      - name: Electronic Ordering Integration
        description: >-
          EDI-based electronic ordering for professional shop management systems
          to submit parts orders directly to AutoZone commercial accounts.
      - name: Parts Catalog Search
        description: >-
          Comprehensive automotive parts catalog search by year, make, model,
          and engine with cross-reference lookup across AutoZone's inventory.
      - name: Commercial Account Management
        description: >-
          AutoZone Pro commercial accounts with net terms, purchase history,
          and account management for professional automotive service businesses.
      - name: ALLDATA Integration
        description: >-
          AutoZone owns ALLDATA, a leading automotive repair information system
          providing OEM repair data, wiring diagrams, and technical service
          bulletins integrated with parts ordering workflows.
      - name: Store Inventory Lookup
        description: >-
          Real-time inventory availability checking across 7,000+ AutoZone
          stores for in-store pickup and same-day availability.
  - type: UseCases
    data:
      - name: Professional Shop Parts Ordering
        description: >-
          Automotive repair shops integrate their shop management software
          with AutoZone Pro for seamless parts ordering and delivery.
      - name: Fleet Parts Procurement
        description: >-
          Fleet operators establish AutoZone commercial accounts for centralized
          parts procurement across multiple vehicles and locations.
      - name: DIY Auto Repair
        description: >-
          Do-it-yourself customers use AutoZone's website and app to find
          the correct parts, watch how-to videos, and purchase for pickup or delivery.
      - name: Repair Information Access
        description: >-
          Shops using ALLDATA access OEM repair data and technical information
          integrated with AutoZone parts availability and pricing.
  - type: Integrations
    data:
      - name: Shop Management Systems
        description: >-
          Electronic ordering integrations with leading SMS platforms including
          Mitchell 1, ALLDATA Repair, Tekmetric, and Shop-Ware for professional shops.
      - name: ALLDATA
        description: >-
          AutoZone's ALLDATA subsidiary provides OEM repair information integrated
          with parts ordering for professional repair facilities.
      - name: Fleet Management Software
        description: >-
          Integration with fleet maintenance platforms for commercial accounts
          managing parts procurement across vehicle fleets.
